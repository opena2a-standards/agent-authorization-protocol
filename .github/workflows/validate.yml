name: schemas

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: schemas + spec examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python3 -m pip install "jsonschema>=4.21" "cryptography>=42"

      - name: Validate schemas and mapped spec examples
        run: python3 scripts/validate_examples.py

      - name: Token fixture drift gate (regenerate, byte-compare, embed-check)
        run: python3 scripts/generate_examples.py --check
